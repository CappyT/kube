apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 5m
  chart:
    spec:
      chart: velero
      version: "12.1.0"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: velero
  values:
    image:
      repository: velero/velero
      tag: v1.18.1
    deployNodeAgent: true
    nodeAgent:
      extraArgs:
        - --node-agent-configmap=velero-node-agent-config
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.1
        volumeMounts:
          - mountPath: /target
            name: plugins
    configuration:
      features: EnableCSI
      extraArgs:
        - --max-concurrent-k8s-connections=4
        - --default-item-operation-timeout=4h
        - --garbage-collection-frequency=1h
      backupStorageLocation:
      - name: default
        provider: aws
        bucket: k8s-backup
        config:
          region: us-east-1
          s3ForcePathStyle: "true"
          s3Url: https://s3.cappyt.sh
      volumeSnapshotLocation:
        - name: default
          provider: aws
          config:
            region: us-east-1
    credentials:
      useSecret: true
      name: velero-minio-credentials
    upgradeCRDs: true