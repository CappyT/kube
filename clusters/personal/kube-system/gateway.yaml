apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-gateway
  namespace: kube-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  infrastructure:
    labels:
      type: public
    annotations:
      io.cilium/lb-ipam-ips: "185.242.182.145"
      lbipam.cilium.io/sharing-key: "main-ip"
      lbipam.cilium.io/sharing-cross-namespace: "default"
  gatewayClassName: envoy
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    protocol: HTTPS
    port: 443
    hostname: 'cappyt.sh'
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
        - name: cappyt-sh-cert
          kind: Secret
  - name: https-wildcard
    protocol: HTTPS
    port: 443
    hostname: '*.cappyt.sh'
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
        - name: wildcard-cappyt-sh-cert
          kind: Secret
  - name: https-ts-wildcard
    protocol: HTTPS
    port: 443
    hostname: '*.thestashie.one'
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
        - name: thestashie-one-cert
          kind: Secret
  - name: https-nolicen-wildcard
    protocol: HTTPS
    port: 443
    hostname: '*.nolicen.se'
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
        - name: wildcard-nolicen-se-cert
          kind: Secret
  - name: ssh
    protocol: TCP
    port: 22
    allowedRoutes:
      kinds:
        - kind: TCPRoute
      namespaces:
        from: All
  - name: smtp
    protocol: TCP
    port: 25
    allowedRoutes:
      kinds:
        - kind: TCPRoute
      namespaces:
        from: All
  - name: smtps
    protocol: TCP
    port: 465
    allowedRoutes:
      kinds:
        - kind: TCPRoute
      namespaces:
        from: All
  - name: imaps
    protocol: TCP
    port: 993
    allowedRoutes:
      kinds:
        - kind: TCPRoute
      namespaces:
        from: All
  - name: pop3s
    protocol: TCP
    port: 995
    allowedRoutes:
      kinds:
        - kind: TCPRoute
      namespaces:
        from: All
---
