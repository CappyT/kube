      certificateRefs:
        - name: cappyt-sh-cert
          kind: Secret
  - name: https-wildcard
    protocol: HTTPS
    port: 443
    hostname: '*.cappyt.sh'
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
        - name: wildcard-cappyt-sh-cert
