apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stalwart
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: stalwart
    spec:
      containers:
      - name: stalwart
        image: "stalwartlabs/stalwart:v0.15.5"
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /healthz/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10        
        ports:
        - containerPort: 8080
        - containerPort: 443
        - containerPort: 25
        - containerPort: 587
        - containerPort: 465
        - containerPort: 143
        - containerPort: 993
        - containerPort: 995
        - containerPort: 110
        - containerPort: 4190
        volumeMounts:
        - name: stalwart-volume
          mountPath: /opt/stalwart
      volumes:
      - name: stalwart-volume
        persistentVolumeClaim:
          claimName: stalwart-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stalwart-pvc
  namespace: default
spec:
  resources:
    requests:
      storage: 30Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: replica
---
apiVersion: v1
kind: Service
metadata:
  name: stalwart
  namespace: default
  labels:
      type: public
  annotations:
    io.cilium/lb-ipam-ips: "185.242.182.146"
spec:
  externalTrafficPolicy: Local
  type: LoadBalancer
  ports:
  - name: https
    port: 443
    targetPort: 443
  - name: smtp
    port: 25
    targetPort: 25
  - name: smtps
    port: 465
    targetPort: 465
  - name: imaps
    port: 993
    targetPort: 993
  - name: pop3s
    port: 995
    targetPort: 995
  selector:
    app: stalwart
---
apiVersion: v1
kind: Service
metadata:
  name: stalwart-private
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: submission
    port: 587
    targetPort: 587
  - name: imap
    port: 143
    targetPort: 143
  - name: pop3
    port: 110
    targetPort: 110
  - name: sieve
    port: 4190
    targetPort: 4190
  selector:
    app: stalwart
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: stalwart-dns
  namespace: default
spec:
  endpoints:
  - dnsName: post.cappyt.sh
    recordTTL: 180
    recordType: A
    targets:
    - 185.242.182.146
    providerSpecific:
      - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
        value: "false"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roundcube-pvc
  namespace: default
spec:
  storageClassName: replica
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: default
  labels:
    app: roundcube
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:1.6.14-apache-nonroot
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          env:
            - name: ROUNDCUBEMAIL_DB_TYPE
              value: "sqlite"
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "ssl://post.cappyt.sh"
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: "ssl://post.cappyt.sh"
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "465"
            - name: ROUNDCUBEMAIL_SKIN
              value: "elastic"
            - name: ROUNDCUBEMAIL_PLUGINS
              value: "archive,zipdownload,managesieve,markasjunk,attachment_reminder,vcard_attachments"
          volumeMounts:
            - name: sqlite-data
              mountPath: /var/roundcube/db
            - name: managesieve-config
              mountPath: /var/roundcube/config/managesieve.inc.php
              subPath: managesieve.inc.php
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: roundcube-pvc
        - name: managesieve-config
          configMap:
            name: roundcube-managesieve-config
---
apiVersion: v1
kind: Service
metadata:
  name: roundcube-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: roundcube
  ports:
    - port: 8080
      targetPort: 8000
      name: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: roundcube-route
  namespace: default
spec:
  hostnames:
    - webmail.cappyt.sh
  parentRefs:
  - name: public-gateway
    namespace: kube-system
  rules:
  - backendRefs:
    - name: roundcube-svc
      port: 8080
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: roundcube-dns
  namespace: default
spec:
  endpoints:
  - dnsName: webmail.cappyt.sh
    recordTTL: 180
    recordType: A
    targets:
    - 185.242.182.145
    providerSpecific:
      - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
        value: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: roundcube-managesieve-config
  namespace: default
data:
  managesieve.inc.php: |
    <?php
    $config['managesieve_host'] = 'tls://stalwart-private';
    $config['managesieve_port'] = 4190;
    $config['managesieve_conn_options'] = array(
      'ssl' => array(
        'verify_peer'       => false,
        'verify_peer_name'  => false,
      ),
    );