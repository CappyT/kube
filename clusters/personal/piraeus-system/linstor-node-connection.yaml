apiVersion: piraeus.io/v1
kind: LinstorNodeConnection
metadata:
  name: dedicated-storage-10g
spec:
  paths:
    - name: 10g-data
      interface: storage
    - name: 1g-control
      interface: default-ipv4
  # Questo è il trucco magico: diciamo a LINSTOR che le connessioni dati (DRBD)
  # devono usare il path '10g-data', ignorando tutto il resto.
  props:
    - name: "Paths/10g-data/DrbdOptions/Net/use-rlink-checksums"
      value: "no" #