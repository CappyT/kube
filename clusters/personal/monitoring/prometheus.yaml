apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: monitoring
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus
  namespace: monitoring
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: kube-prometheus-grafana
              namespace: monitoring
            patch: |
              - op: replace
                path: /spec/strategy/type
                value: Recreate
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '83.4.2'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      interval: 5m
  releaseName: kube-prometheus
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    crd:
      upgradeJob:
        enabled: true
    defaultRules:
      rules:
        kubeProxy: false

    nodeExporter:
      operatingSystems:
        darwin:
          enabled: false
        aix:
          enabled: false
  
    kubeProxy:
      enabled: false

    kubeControllerManager:
      enabled: true
      endpoints:
        - 10.122.0.20

    kubeEtcd:
      enabled: true
      endpoints:
        - 10.122.0.20
      service:
        enabled: true
        port: 2381
        targetPort: 2381

    kubeScheduler:
      enabled: true
      endpoints:
        - 10.122.0.20

    grafana:
      defaultDashboardsTimezone: Europe/Rome
      envFromSecret: grafana-oidc-secrets

      grafana.ini:
        server:
          root_url: https://grafana.cappyt.sh
        auth:
          disable_login_form: true
        auth.generic_oauth:
          enabled: true
          name: Cappys
          allow_sign_up: true
          client_id: ${OIDC_CLIENT_ID}
          client_secret: ${OIDC_CLIENT_SECRET}
          scopes: openid profile email
          auth_url: https://auth.cappyt.sh/webman/sso/SSOOauth.cgi
          token_url: https://auth.cappyt.sh/webman/sso/SSOAccessToken.cgi
          api_url: https://auth.cappyt.sh/webman/sso/SSOUserInfo.cgi
          role_attribute_path: "(login == 'cappyt' || email == 'me@cappyt.sh') && 'Admin' || 'Viewer'"
      persistence:
        enabled: true
        storageClassName: "replica"
        accessModes: ["ReadWriteOnce"]
        size: 10Gi

    alertmanager:
      alertmanagerSpec:
        configSecret: alertmanager-kube-prometheus-alertmanager

    prometheus:
      prometheusSpec:
        evaluationInterval: 30s
        scrapeInterval: 30s
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: single
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        scrapeConfigSelector: {}
        scrapeConfigNamespaceSelector: {}
        scrapeConfigSelectorNilUsesHelmValues: false
        ruleSelector: {}
        ruleNamespaceSelector: {}
        ruleSelectorNilUsesHelmValues: false
        podMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        probeSelector: {}
        probeNamespaceSelector: {}
        probeSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        serviceMonitorSelectorNilUsesHelmValues: false
                