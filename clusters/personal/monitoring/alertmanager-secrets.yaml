apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-kube-prometheus-alertmanager
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: alertmanager-kube-prometheus-alertmanager
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m

          inhibit_rules:
            - equal:
                - namespace
                - alertname
              source_matchers:
                - severity = critical
              target_matchers:
                - severity =~ warning|info
            - equal:
                - namespace
                - alertname
              source_matchers:
                - severity = warning
              target_matchers:
                - severity = info
            - equal:
                - namespace
              source_matchers:
                - alertname = InfoInhibitor
              target_matchers:
                - severity = info
            - target_matchers:
                - alertname = InfoInhibitor

          route:
            group_by: ['namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
            receiver: 'null'
            routes:
              - matchers:
                  - alertname = Watchdog
                receiver: 'healthchecks_io'
                group_wait: 0s
                group_interval: 1m
                repeat_interval: 2m

          receivers:
            - name: 'null'
            - name: 'healthchecks_io'
              webhook_configs:
                - url: '{{ .HEALTHCHECKS_URL }}'
                  send_resolved: false

          templates:
            - '/etc/alertmanager/config/*.tmpl'

  data:
    - secretKey: HEALTHCHECKS_URL
      remoteRef:
        key: /monitoring/alertmanager/healthchecks-url
